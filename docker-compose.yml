# Nebula Discover — local single-container run (mirrors the Azure Container Apps image).
# One service: FastAPI serves the built React SPA (same origin) AND the /api routes.
#   docker compose up --build   →   http://localhost:8000
services:
  nebula:
    build:
      context: .
      dockerfile: Dockerfile
    image: nebula-discover:latest
    ports:
      - "8000:8000"
    environment:
      - NEBULA_OFFLINE=${NEBULA_OFFLINE:-0}      # 0 = live public APIs (product default)
      - NEBULA_CORS_ORIGINS=${NEBULA_CORS_ORIGINS:-}
