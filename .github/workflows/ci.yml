name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle
      - run: npm audit --omit=dev

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: pip
      - run: python -m pip install -e './backend[dev,physics]'
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - run: npm ci
      - run: npm run gen:contracts
      - run: git diff --exit-code -- backend/openapi.json src/contracts/api.ts
      - run: python -m pytest -q
        working-directory: backend

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e './backend[dev]'
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --project=chromium-swiftshader

  container:
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag nebula-discover:ci .
