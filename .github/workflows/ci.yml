name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle
      - run: npm audit --omit=dev

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: pip
      - run: python -m pip install -e './backend[dev,physics]'
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - run: npm ci
      - run: npm run gen:contracts
      - run: git diff --exit-code -- backend/openapi.json src/contracts/api.ts
      - run: python -m pytest -q
        working-directory: backend

  e2e:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e './backend[dev]'
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --project=chromium-swiftshader --project=backend-api

  container:
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag nebula-discover:ci .
      - name: Smoke-test the built container and discovery pipeline
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run --detach \
            --name nebula-discover-ci \
            --publish 127.0.0.1:18080:8000 \
            --env NEBULA_OFFLINE=1 \
            --env NEBULA_RUN_DB=/tmp/nebula-smoke.sqlite \
            nebula-discover:ci)"
          cleanup() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              docker logs "$container_id" || true
            fi
            docker rm --force "$container_id" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT
          python3 scripts/container_smoke.py \
            --base-url http://127.0.0.1:18080 \
            --mode full \
            --startup-timeout 120 \
            --run-timeout 120
