name: Deploy to Azure Container Apps

# Builds the single-container image (React SPA + FastAPI /api), pushes it to Azure
# Container Registry, and rolls a new Azure Container Apps revision.
#
# YOU must create these once (the assistant cannot create cloud resources or handle
# credentials). See below.
#
# Repo SECRETS (Settings → Secrets and variables → Actions → Secrets):
#   AZURE_CLIENT_ID        – Entra app registration (federated GitHub OIDC) client id
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
# Repo VARIABLES (…→ Variables):
#   ACR_NAME               – e.g. nebuladiscoveracr
#   RESOURCE_GROUP         – e.g. nebula-discover-rg
#   CONTAINER_APP_NAME     – e.g. nebula-discover
#   CONTAINER_APP_ENV      – the Container Apps environment name
#
# One-time setup (az CLI):
#   az group create -n <RESOURCE_GROUP> -l <region>
#   az acr create -n <ACR_NAME> -g <RESOURCE_GROUP> --sku Basic
#   az containerapp env create -n <CONTAINER_APP_ENV> -g <RESOURCE_GROUP> -l <region>
#   # Entra app + federated credential for THIS repo, then role assignments:
#   #   AcrPush on the ACR, Contributor on the resource group.
#   # After the first deploy, raise the ingress timeout for the long SSE runs:
#   az containerapp ingress update -n <CONTAINER_APP_NAME> -g <RESOURCE_GROUP> \
#       --transport auto  # and set a generous request timeout in the env if needed
# Keep min-replicas = 1, max-replicas = 1 (runs use a local SQLite store; do NOT scale
# out — see _find_dossier note in the plan).

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: nebula-discover-production
  cancel-in-progress: true

permissions:
  id-token: write   # OIDC federated login
  contents: read

jobs:
  verify-manual-deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"
          cache: pip
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: python -m pip install -e './backend[dev,physics]'
      - run: python -m pytest -q
        working-directory: backend
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --project=chromium-swiftshader --project=backend-api

  deploy:
    if: >-
      always() &&
      ((github.event_name == 'workflow_dispatch' && needs.verify-manual-deploy.result == 'success') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
    needs: [verify-manual-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.14"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image, push to ACR, deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ vars.ACR_NAME }}
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppName: ${{ vars.CONTAINER_APP_NAME }}
          containerAppEnvironment: ${{ vars.CONTAINER_APP_ENV }}
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          targetPort: 8000
          ingress: external
          # product runs live; single-origin so CORS is unused
          environmentVariables: NEBULA_OFFLINE=0 NEBULA_CORS_ORIGINS=

      - name: Enforce single-replica local-store safety
        shell: bash
        run: |
          set -euo pipefail
          az containerapp revision set-mode \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --mode single \
            --only-show-errors
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --min-replicas 1 \
            --max-replicas 1 \
            --only-show-errors

          read -r revision_mode min_replicas max_replicas < <(
            az containerapp show \
              --name "${{ vars.CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --query '[properties.configuration.activeRevisionsMode, properties.template.scale.minReplicas, properties.template.scale.maxReplicas]' \
              --output tsv
          )
          if [ "${revision_mode,,}" != "single" ] || [ "$min_replicas" != "1" ] || [ "$max_replicas" != "1" ]; then
            echo "Unsafe Container Apps scale configuration: mode=$revision_mode min=$min_replicas max=$max_replicas" >&2
            exit 1
          fi
          echo "Verified Container Apps safety: mode=$revision_mode min=$min_replicas max=$max_replicas"

      - name: Smoke-test the deployed application
        id: production-smoke
        shell: bash
        run: |
          set -euo pipefail
          fqdn="$(az containerapp show \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          if [ -z "$fqdn" ]; then
            echo "Azure Container Apps returned an empty ingress FQDN." >&2
            exit 1
          fi
          app_url="https://$fqdn"
          python scripts/container_smoke.py \
            --base-url "$app_url" \
            --mode full \
            --startup-timeout 180 \
            --run-timeout 180
          echo "app_url=$app_url" >> "$GITHUB_OUTPUT"
          echo "Deployed application: $app_url"

      - name: Publish deployment URL
        shell: bash
        env:
          APP_URL: ${{ steps.production-smoke.outputs.app_url }}
        run: |
          {
            echo "### Nebula Discover deployment"
            echo
            echo "- Application: [$APP_URL]($APP_URL)"
            echo "- Smoke: passed (SPA root + API health + completed discovery run)"
            echo "- Store safety: single revision, min replicas 1, max replicas 1"
          } >> "$GITHUB_STEP_SUMMARY"
